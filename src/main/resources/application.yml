server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:/config-server}

spring:
  application:
    name: config-server
    version: 1.0.0
  profiles:
    active: dev
  banner:
    charset: UTF-8
    location: classpath:banner.txt
    mode: console

global:
  base-path: ${CONFIG_BASE_PATH:/config/}
  commit-history-size: ${CONFIG_COMMIT_HISTORY_SIZE:10}
server:
  port: 8080
  servlet:
    context-path: /config-server

spring:
  application.name: config-server
  cache.type: caffeine
  cloud.config.server.prefix: /config-api
  web.cors.allowed-origins: http://localhost:3000
  web.cors.allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  web.cors.allowed-headers: "*"

configserver:
  base-path: ${CONFIG_BASE_PATH:/config/}
  commit-history-size: ${CONFIG_COMMIT_HISTORY_SIZE:20}
  refreshNotifyUrl:
    demo: http://localhost:8085/config-client/actuator/refresh
    prod: http://localhost:8085/config-client/actuator/refresh
    production: http://localhost:8085/config-client/actuator/refresh
    test: http://localhost:8085/config-client/actuator/refresh
    uat: http://localhost:8085/config-client/actuator/refresh
    dev: http://localhost:8085/config-client/actuator/refresh
  vault:
    enabled: ${VAULT_ENABLED:true}
    cache-ttl: ${VAULT_CACHE_TTL:600}
    max-secrets-per-operation: ${VAULT_MAX_SECRETS:100}